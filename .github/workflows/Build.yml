name: Build VPet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore VPet.sln

      - name: Build VPet (x64 Release)
        # Явно передаем платформу x64, как требует инструкция в README
        run: >
          dotnet build VPet.sln --configuration Release --arch x64 --no-restore
          "/flp:logfile=build.log;verbosity=detailed"
          "/flp1:logfile=build.err.log;errorsonly"

      - name: Copy Game Resources (Instead of mklink.bat)
        # Физически копируем моды и локализацию прямо в папку сборки x64 клиента
        run: |
          xcopy "VPet-Simulator.Windows\mod" "VPet-Simulator.Windows\bin\x64\Release\net8.0-windows\mod" /E /I /Y
          if exist "VPet-Simulator.Windows\lang" xcopy "VPet-Simulator.Windows\lang" "VPet-Simulator.Windows\bin\x64\Release\net8.0-windows\lang" /E /I /Y

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VPet-Simulator-Windows-x64
          # Указываем точный путь к собранному x64 приложению, куда мы скопировали ресурсы
          path: VPet-Simulator.Windows/bin/x64/Release/net8.0-windows/
          if-no-files-found: error

      - name: Upload build log artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build.log
            build.err.log
          if-no-files-found: warn
