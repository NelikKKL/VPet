name: Build VPet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive 

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore VPet.sln

      - name: Build VPet (Release)
        # Добавили флаги логгера msbuild, чтобы генерировались файлы логов
        run: >
          dotnet build VPet.sln --configuration Release --no-restore
          /flp:logfile=build.log;verbosity=detailed
          /flp1:logfile=build.err.log;errorsonly

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: VPet-Simulator.Windows-Release
          path: VPet-Simulator.Windows/bin/Release/
          if-no-files-found: error

      - name: Upload failure log artifact
        # Этот шаг сработает только в случае падения сборки
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: |
            build.log
            build.err.log
          if-no-files-found: warn
