name: Build VPet

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore VPet.sln

      - name: Build (x64, Release)
        run: msbuild VPet.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: VPet-Simulator.Windows-x64
          path: VPet-Simulator.Windows/bin/x64/Release/
          if-no-files-found: error
